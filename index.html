<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff7f2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="おまもりみくじ">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>おまもりみくじ｜ちゃろまる</title>
  <style>
    :root {
      --paper: #fffaf5;
      --paper2: #fff1ed;
      --ink: #5b3025;
      --soft-ink: #80594d;
      --red: #c94e45;
      --pink: #ed9999;
      --deep-pink: #df7779;
      --line: rgba(193, 91, 79, .23);
      --card: rgba(255, 252, 248, .91);
      --shadow: 0 18px 45px rgba(124, 72, 54, .13);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho",
                   "Hiragino Kaku Gothic ProN", -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at 15% 6%, rgba(255,255,255,.95) 0 7%, transparent 27%),
        radial-gradient(circle at 94% 8%, rgba(255,215,218,.52) 0 6%, transparent 25%),
        linear-gradient(165deg, var(--paper), var(--paper2));
      padding:
        max(18px, env(safe-area-inset-top))
        14px
        max(28px, env(safe-area-inset-bottom));
      overflow-x: hidden;
    }

    body::before,
    body::after {
      position: fixed;
      pointer-events: none;
      opacity: .20;
      font-size: 140px;
      z-index: -1;
    }
    body::before { content: "🌸"; top: -38px; left: -45px; transform: rotate(-18deg); }
    body::after  { content: "🌸"; right: -42px; bottom: -45px; transform: rotate(17deg); }

    .app {
      width: min(100%, 520px);
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      padding: 8px 8px 0;
    }

    .knot {
      font-size: 30px;
      color: var(--pink);
      line-height: 1;
    }

    h1 {
      margin: 4px 0 4px;
      font-size: clamp(38px, 11vw, 58px);
      line-height: 1.05;
      letter-spacing: .12em;
      font-weight: 700;
    }

    .hero-sub {
      margin: 10px 0 14px;
      color: var(--soft-ink);
      font-size: 15px;
      letter-spacing: .08em;
    }

    .today-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 15px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.68);
      font-size: 13px;
      box-shadow: 0 8px 22px rgba(135, 81, 66, .08);
    }

    .stage {
      position: relative;
      margin-top: 17px;
      padding: 20px 17px 18px;
      border: 1.5px solid var(--line);
      border-radius: 30px;
      background:
        linear-gradient(rgba(255,255,255,.78), rgba(255,255,255,.88)),
        radial-gradient(circle at 15% 20%, #ffd8d4 0 2px, transparent 3px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .stage::before {
      content: "✿  ✿  ✿";
      position: absolute;
      right: 16px;
      top: 12px;
      color: rgba(211, 103, 96, .20);
      letter-spacing: 8px;
      font-size: 22px;
    }

    .intro {
      margin: 0 0 6px;
      text-align: center;
      font-size: 16px;
      letter-spacing: .05em;
    }

    .character-wrap {
      min-height: 390px;
      display: grid;
      place-items: end center;
      margin: 0 -18px -14px;
      pointer-events: none;
    }

    .character {
      width: min(93%, 430px);
      max-height: 430px;
      object-fit: contain;
      object-position: bottom center;
      filter: drop-shadow(0 13px 12px rgba(101, 58, 43, .16));
    }

    .draw-panel {
      position: relative;
      margin-top: -9px;
      padding: 17px;
      border-radius: 23px;
      background: rgba(255, 250, 247, .94);
      border: 1px solid var(--line);
    }

    button {
      appearance: none;
      border: 0;
      width: 100%;
      min-height: 64px;
      border-radius: 999px;
      padding: 14px 22px;
      color: white;
      font-family: inherit;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: .08em;
      background: linear-gradient(135deg, #ef9a9a, #dc7478);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.28),
        0 11px 22px rgba(196, 82, 91, .23);
      cursor: pointer;
      transition: transform .15s ease, filter .15s ease;
    }

    button:active { transform: scale(.98); }
    button:hover { filter: brightness(1.02); }

    .note {
      text-align: center;
      color: var(--soft-ink);
      margin: 12px 0 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .result {
      display: none;
      margin-top: 17px;
      padding: 22px 18px;
      border-radius: 28px;
      background: var(--card);
      border: 1.5px solid var(--line);
      box-shadow: var(--shadow);
    }

    .result.show {
      display: block;
      animation: appear .55s cubic-bezier(.2,.8,.2,1) both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(14px) scale(.98); }
      to   { opacity: 1; transform: none; }
    }

    .rank-wrap {
      text-align: center;
      padding-bottom: 17px;
      border-bottom: 1px dashed var(--line);
    }

    .rank-label {
      font-size: 13px;
      color: var(--soft-ink);
      letter-spacing: .14em;
    }

    .rank {
      margin: 7px 0 2px;
      font-size: clamp(44px, 14vw, 66px);
      letter-spacing: .10em;
      color: var(--red);
      line-height: 1.1;
    }

    .rank-sub {
      color: var(--soft-ink);
      font-size: 14px;
    }

    .message {
      text-align: center;
      font-size: 17px;
      line-height: 1.9;
      margin: 21px 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
    }

    .mini, .action {
      border: 1px solid rgba(204, 114, 104, .15);
      background: rgba(255, 243, 241, .82);
      border-radius: 18px;
      padding: 15px;
    }

    .mini { min-height: 104px; }
    .action { margin-top: 11px; }

    .label {
      color: var(--soft-ink);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .value {
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      font-size: 16px;
      line-height: 1.5;
      font-weight: 700;
    }

    .profile {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 15px;
      align-items: center;
      margin-top: 17px;
      padding: 17px;
      border-radius: 25px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.69);
    }

    .profile img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 7px 17px rgba(110, 61, 47, .13);
    }

    .profile h2 {
      font-size: 18px;
      margin: 0 0 6px;
      letter-spacing: .07em;
    }

    .profile p {
      margin: 0;
      color: var(--soft-ink);
      font-size: 13px;
      line-height: 1.7;
    }

    footer {
      text-align: center;
      color: var(--soft-ink);
      opacity: .72;
      font-size: 12px;
      margin: 20px 0 0;
      line-height: 1.7;
    }

    .petal {
      position: fixed;
      top: -40px;
      pointer-events: none;
      z-index: 20;
      animation: fall linear forwards;
      will-change: transform, opacity;
    }

    @keyframes fall {
      0%   { opacity: 0; transform: translate3d(0,-25px,0) rotate(0deg); }
      12%  { opacity: .95; }
      100% { opacity: 0; transform: translate3d(var(--drift),105vh,0) rotate(560deg); }
    }

    @media (max-width: 390px) {
      .character-wrap { min-height: 330px; }
      .character { max-height: 370px; }
      .profile { grid-template-columns: 74px 1fr; }
      .profile img { width: 74px; height: 74px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="knot">⌁୨୧⌁</div>
      <h1>おまもり<br>みくじ</h1>
      <p class="hero-sub">ちゃろまるが、今日のおまもりを授けます</p>
      <div class="today-chip">🌸 今日のおみくじ・1日1回</div>
    </header>

    <section class="stage" id="drawCard">
      <p class="intro">巫女ねこ・ちゃろまる</p>
      <div class="character-wrap">
        <img class="character" src="charomaru-miko.png" alt="巫女姿のちゃろまる">
      </div>
      <div class="draw-panel">
        <button id="drawBtn">🐾 おみくじをひく</button>
        <p class="note">今日のあなたに、やさしい言葉と小さなおまもりをお届けします。</p>
      </div>
    </section>

    <section class="result" id="resultCard" aria-live="polite">
      <div class="rank-wrap">
        <div class="rank-label">今日の運勢</div>
        <p class="rank" id="rank"></p>
        <div class="rank-sub" id="rankSub"></div>
      </div>

      <div class="message" id="message"></div>

      <div class="grid">
        <div class="mini">
          <div class="label">ラッキーカラー</div>
          <div class="value" id="color"></div>
        </div>
        <div class="mini">
          <div class="label">ラッキーアイテム</div>
          <div class="value" id="item"></div>
        </div>
      </div>

      <div class="action">
        <div class="label">ちゃろまるからの開運アクション</div>
        <div class="value" id="action"></div>
      </div>
    </section>

    <section class="profile">
      <img src="apple-touch-icon.png" alt="ちゃろまるの顔">
      <div>
        <h2>ちゃろまるについて</h2>
        <p>やさしくて、食いしん坊な巫女ねこ。毎日をそっと見守り、少し元気になれる言葉を届けます。</p>
      </div>
    </section>

    <footer>
      今日も、あなたにやさしいご縁がありますように。<br>
      © 2026 charomaru. All rights reserved.
    </footer>
  </main>

<script>
const ranks = [
  { name: "超大吉", weight: 1, sub: "特別な追い風が吹く一日" },
  { name: "大吉",   weight: 9, sub: "うれしい流れに乗れそう" },
  { name: "吉",     weight: 35, sub: "穏やかに運が味方する日" },
  { name: "中吉",   weight: 30, sub: "少しずつ良い方向へ" },
  { name: "小吉",   weight: 20, sub: "小さな幸せに出会える日" },
  { name: "末吉",   weight: 5, sub: "焦らず進めば大丈夫" }
];

const messages = [
  "緊張する日は、うまく見せようとしなくて大丈夫。あなたらしい言葉が、きっと相手に届きます。",
  "今日のあなたには、思っている以上に味方がいます。深呼吸して、自分の歩幅で進みましょう。",
  "少しの勇気が、新しいご縁を運んできそう。まずは笑顔で一歩を踏み出してみて。",
  "迷ったときは、心が少し軽くなる方を選んで。ちゃろまるがそっと応援しています。",
  "今日できたことを一つ見つけて、自分をたくさん褒めてあげてください。",
  "無理をしすぎなくて大丈夫。ゆっくり進むことも、立派な前進です。",
  "何気ない会話の中に、うれしいヒントがありそう。相手の言葉をゆっくり聞いてみて。",
  "新しいことを始めるなら、今日は小さな一歩がぴったりです。",
  "好きなものに触れる時間が、心と運をやさしく整えてくれそう。",
  "あなたのまっすぐな気持ちは、きっと伝わります。今日も自分を信じて。"
];

const colors = [
  "🩷 桜色", "🤍 パールホワイト", "🧡 アプリコット",
  "💛 山吹色", "💚 若草色", "🩵 空色", "💜 藤色", "❤️ 朱色"
];

const items = [
  "お気に入りのノート", "小さな鏡", "ハンカチ", "イヤホン",
  "髪飾り", "お気に入りのペン", "猫のモチーフ", "リップクリーム",
  "香りのよいハンドクリーム", "小さなポーチ"
];

const actions = [
  "「ありがとう」を一回多く伝える",
  "好きな音楽を一曲聴く",
  "机の上を少しだけ整える",
  "空を見上げて深呼吸する",
  "温かい飲み物をゆっくり飲む",
  "今日のよかったことを一つ書く",
  "いつもより少し早く休む",
  "鏡の前でやさしく笑ってみる",
  "気になっていたことを5分だけ始める",
  "大切な人にやさしい言葉をかける"
];

const KEY = "omamori_mikuji_v2";

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function pickWeighted(list) {
  const total = list.reduce((sum, item) => sum + item.weight, 0);
  let random = Math.random() * total;
  for (const item of list) {
    random -= item.weight;
    if (random < 0) return item;
  }
  return list[list.length - 1];
}

function pick(list) {
  return list[Math.floor(Math.random() * list.length)];
}

function render(result) {
  document.getElementById("drawCard").style.display = "none";
  document.getElementById("resultCard").classList.add("show");
  document.getElementById("rank").textContent = result.rank.name;
  document.getElementById("rankSub").textContent = result.rank.sub;
  document.getElementById("message").textContent = result.message;
  document.getElementById("color").textContent = result.color;
  document.getElementById("item").textContent = result.item;
  document.getElementById("action").textContent = result.action;
  setTimeout(() => document.getElementById("resultCard").scrollIntoView({behavior:"smooth", block:"center"}), 180);
}

function petalBurst(extra = false) {
  const count = extra ? 34 : 20;
  const petals = ["🌸", "🌺", "✨"];
  for (let i = 0; i < count; i++) {
    const el = document.createElement("span");
    el.className = "petal";
    el.textContent = petals[Math.floor(Math.random() * petals.length)];
    el.style.left = `${Math.random() * 100}vw`;
    el.style.fontSize = `${14 + Math.random() * 14}px`;
    el.style.setProperty("--drift", `${-80 + Math.random() * 160}px`);
    el.style.animationDuration = `${2.7 + Math.random() * 2.5}s`;
    el.style.animationDelay = `${Math.random() * .65}s`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 6000);
  }
}

function draw() {
  const result = {
    date: todayKey(),
    rank: pickWeighted(ranks),
    message: pick(messages),
    color: pick(colors),
    item: pick(items),
    action: pick(actions)
  };
  localStorage.setItem(KEY, JSON.stringify(result));
  render(result);
  petalBurst(result.rank.name === "超大吉" || result.rank.name === "大吉");
}

document.getElementById("drawBtn").addEventListener("click", draw);

try {
  const saved = JSON.parse(localStorage.getItem(KEY));
  if (saved && saved.date === todayKey()) {
    render(saved);
  }
} catch (error) {
  localStorage.removeItem(KEY);
}
</script>
</body>
</html>
