<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fff5f2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="おまもりみくじ">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <title>おまもりみくじ</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --ink: #5c392f;
      --soft: #85675e;
      --pink: #dc7f86;
      --pink-light: #f4b1b3;
      --paper: rgba(255,255,255,.92);
      --line: rgba(186,108,103,.22);
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px 14px 36px;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
                   "Yu Gothic", "Meiryo", sans-serif;
      background:
        radial-gradient(circle at 12% 5%, rgba(255,255,255,.95), transparent 28%),
        radial-gradient(circle at 90% 12%, rgba(255,210,214,.5), transparent 26%),
        linear-gradient(160deg, #fffaf5, #fff0ed);
    }

    .app {
      width: min(100%, 520px);
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 16px;
    }

    .flower {
      font-size: 27px;
      margin-bottom: 4px;
    }

    h1 {
      margin: 0;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
      font-size: clamp(36px, 10vw, 54px);
      letter-spacing: .10em;
      line-height: 1.2;
    }

    .subtitle {
      margin: 8px 0 12px;
      color: var(--soft);
      font-size: 14px;
      line-height: 1.7;
    }

    .date {
      display: inline-block;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.7);
      color: var(--soft);
      font-size: 13px;
    }

    .main-card,
    .result-card {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--paper);
      box-shadow: 0 16px 36px rgba(113,66,53,.12);
    }

    .main-card {
      padding: 20px 18px 18px;
      text-align: center;
    }

    .welcome {
      margin: 0 0 10px;
      line-height: 1.8;
      font-size: 15px;
    }

    .character {
      display: block;
      width: min(100%, 390px);
      max-height: 420px;
      object-fit: contain;
      margin: 0 auto 4px;
      filter: drop-shadow(0 10px 10px rgba(91,51,42,.15));
    }

    button {
      width: 100%;
      min-height: 60px;
      border: 0;
      border-radius: 999px;
      padding: 13px 20px;
      font: inherit;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .07em;
      cursor: pointer;
    }

    #drawBtn {
      color: white;
      background: linear-gradient(135deg, var(--pink-light), var(--pink));
      box-shadow: 0 10px 21px rgba(196,89,99,.24);
    }

    button:active {
      transform: scale(.985);
    }

    .notice {
      margin: 10px 0 0;
      color: var(--soft);
      font-size: 12px;
      line-height: 1.6;
    }

    .result-card {
      display: none;
      margin-top: 17px;
      padding: 20px 17px;
      text-align: center;
    }

    .result-card.show {
      display: block;
      animation: appear .45s ease both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-label {
      color: var(--soft);
      font-size: 13px;
      letter-spacing: .12em;
    }

    .rank {
      margin: 8px 0 0;
      color: #bf554f;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
      font-size: clamp(48px, 15vw, 68px);
      line-height: 1.1;
      letter-spacing: .09em;
    }

    .reading {
      margin: 4px 0 16px;
      color: var(--soft);
      font-size: 14px;
    }

    .fortune-image {
      display: block;
      width: 100%;
      max-width: 440px;
      margin: 0 auto 17px;
      border-radius: 18px;
      box-shadow: 0 9px 22px rgba(98,60,49,.13);
    }

    .message {
      margin: 10px 2px 18px;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
      font-size: 17px;
      line-height: 1.9;
    }

    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      text-align: left;
    }

    .detail {
      min-height: 98px;
      padding: 13px;
      border: 1px solid rgba(186,108,103,.14);
      border-radius: 16px;
      background: #fff6f3;
    }

    .detail.action {
      grid-column: 1 / -1;
      min-height: auto;
    }

    .detail-label {
      margin-bottom: 7px;
      color: var(--soft);
      font-size: 12px;
    }

    .detail-value {
      line-height: 1.6;
      font-weight: 700;
    }

    #shareBtn {
      margin-top: 15px;
      color: var(--ink);
      background: white;
      border: 1px solid var(--line);
    }

    #shareStatus {
      min-height: 1.5em;
      margin: 8px 0 0;
      color: var(--soft);
      font-size: 12px;
    }

    footer {
      margin-top: 18px;
      text-align: center;
      color: var(--soft);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 380px) {
      .details { grid-template-columns: 1fr; }
      .detail.action { grid-column: auto; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="flower" aria-hidden="true">🌸</div>
      <h1>おまもりみくじ</h1>
      <p class="subtitle">ちゃろまる神社から、今日のあなたへ<br>小さなおまもりをお届けします。</p>
      <div class="date" id="today"></div>
    </header>

    <section class="main-card">
      <p class="welcome">巫女ねこ・ちゃろまるとピーちゃんが<br>やさしい吉を選びます。</p>
      <img class="character" src="./charomaru-miko.png" alt="巫女姿のちゃろまる">
      <button id="drawBtn" type="button">今日のおまもりをひく</button>
      <p class="notice">どのおまもりも順位ではありません。<br>今日のあなたに合う、五つの祝福のひとつです。</p>
    </section>

    <section class="result-card" id="resultCard" aria-live="polite">
      <div class="result-label">今日のおまもり</div>
      <div class="rank" id="rank"></div>
      <div class="reading" id="reading"></div>
      <img class="fortune-image" id="fortuneImage" src="" alt="">
      <p class="message" id="message"></p>

      <div class="details">
        <div class="detail">
          <div class="detail-label">ラッキーカラー</div>
          <div class="detail-value" id="color"></div>
        </div>
        <div class="detail">
          <div class="detail-label">ラッキーアイテム</div>
          <div class="detail-value" id="item"></div>
        </div>
        <div class="detail action">
          <div class="detail-label">今日のおまもり行動</div>
          <div class="detail-value" id="action"></div>
        </div>
      </div>

      <button id="shareBtn" type="button">このおまもりを共有する</button>
      <p id="shareStatus"></p>
    </section>

    <footer>
      未来を決める占いではなく、今日を少しやさしくするおまもりです。<br>
      © ちゃろまる神社
    </footer>
  </main>

  <script>
    "use strict";

    const fortunes = [
      {
        name: "神吉",
        reading: "かみきち",
        image: "./kamiyoshi.png",
        messages: [
          "今日は、不思議なくらい物事が味方してくれそう。焦らず、心が向くほうへ進んでみて。",
          "小さな願いが動き始める日。自分の直感を、いつもより少し信じてみよう。"
        ],
        colors: ["桜色", "白", "金色"],
        items: ["小さなお守り", "お気に入りのアクセサリー", "温かい飲み物"],
        actions: ["一番大切なことを一つだけ決める", "空を見上げて深呼吸する", "心に浮かんだことをメモする"]
      },
      {
        name: "嬉吉",
        reading: "うれきち",
        image: "./ureshiyoshi.png",
        messages: [
          "思わず笑顔になる出来事が見つかりそう。嬉しい気持ちは、遠慮せず受け取って。",
          "今日の喜びは、小さなところに隠れています。好きなことに目を向けてみよう。"
        ],
        colors: ["みかん色", "桃色", "黄色"],
        items: ["甘いお菓子", "好きな音楽", "明るい色のハンカチ"],
        actions: ["嬉しかったことを一つ言葉にする", "好きな曲を一曲聴く", "自分に小さなご褒美をあげる"]
      },
      {
        name: "縁吉",
        reading: "えんきち",
        image: "./en_yoshi.png",
        messages: [
          "人とのつながりが、やさしい力を運んでくれる日。短い言葉でも、気持ちを伝えてみて。",
          "思いがけないご縁が、今日の心を温めてくれそう。挨拶を少し丁寧にしてみよう。"
        ],
        colors: ["若草色", "水色", "生成り色"],
        items: ["メッセージカード", "写真", "お気に入りのペン"],
        actions: ["大切な人に短い連絡をする", "誰かの話をゆっくり聞く", "ありがとうを一度多く伝える"]
      },
      {
        name: "福吉",
        reading: "ふくきち",
        image: "./fukuyoshi.png",
        messages: [
          "いつもの一日の中に、小さな幸せがいくつも見つかりそう。ゆっくり味わって。",
          "足元にある福に気づける日。無理に急がず、心地よいペースで過ごそう。"
        ],
        colors: ["空色", "クリーム色", "淡い緑"],
        items: ["お気に入りのカップ", "柔らかいタオル", "季節の食べ物"],
        actions: ["温かいものをゆっくり飲む", "身の回りを一か所だけ整える", "今日よかったことを三つ探す"]
      },
      {
        name: "優吉",
        reading: "やさきち",
        image: "./yuuyoshi.png",
        messages: [
          "今日は自分にも人にも、少しやさしくできる日。完璧でなくて大丈夫。",
          "やさしさは弱さではなく、今日を守る力です。まずは自分をいたわってあげよう。"
        ],
        colors: ["藤色", "薄桃色", "ミルク色"],
        items: ["柔らかいブランケット", "香りのよいもの", "お気に入りの本"],
        actions: ["自分を責める言葉を一つ手放す", "いつもより少し早く休む", "頑張った自分を褒める"]
      }
    ];

    const STORAGE_KEY = "omamori-mikuji-v4-2";

    const $ = (id) => document.getElementById(id);
    const randomFrom = (array) => array[Math.floor(Math.random() * array.length)];

    function dateKey() {
      const d = new Date();
      return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
    }

    function setToday() {
      const d = new Date();
      $("today").textContent = new Intl.DateTimeFormat("ja-JP", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "short"
      }).format(d);
    }

    function makeFortune() {
      const base = randomFrom(fortunes);
      return {
        date: dateKey(),
        name: base.name,
        reading: base.reading,
        image: base.image,
        message: randomFrom(base.messages),
        color: randomFrom(base.colors),
        item: randomFrom(base.items),
        action: randomFrom(base.actions)
      };
    }

    function saveFortune(fortune) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(fortune));
      } catch (_) {}
    }

    function loadFortune() {
      try {
        const value = localStorage.getItem(STORAGE_KEY);
        if (!value) return null;
        const fortune = JSON.parse(value);
        return fortune.date === dateKey() ? fortune : null;
      } catch (_) {
        return null;
      }
    }

    function showFortune(fortune) {
      $("rank").textContent = fortune.name;
      $("reading").textContent = `（${fortune.reading}）`;
      $("fortuneImage").src = fortune.image;
      $("fortuneImage").alt = `${fortune.name}のおまもり`;
      $("message").textContent = fortune.message;
      $("color").textContent = fortune.color;
      $("item").textContent = fortune.item;
      $("action").textContent = fortune.action;
      $("resultCard").classList.add("show");
      $("drawBtn").textContent = "今日のおまもりを見る";
      setTimeout(() => {
        $("resultCard").scrollIntoView({ behavior: "smooth", block: "start" });
      }, 80);
    }

    function currentFortune() {
      const saved = loadFortune();
      if (saved) return saved;
      const created = makeFortune();
      saveFortune(created);
      return created;
    }

    async function shareFortune() {
      const fortune = loadFortune();
      if (!fortune) {
        $("shareStatus").textContent = "先に今日のおまもりをひいてください。";
        return;
      }

      const text =
        `今日のおまもりは「${fortune.name}（${fortune.reading}）」でした。` +
        `\n${fortune.message}\n#おまもりみくじ #ちゃろまる神社`;

      try {
        if (navigator.share) {
          await navigator.share({
            title: "おまもりみくじ",
            text: text,
            url: location.href
          });
          $("shareStatus").textContent = "共有画面を開きました。";
        } else if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(`${text}\n${location.href}`);
          $("shareStatus").textContent = "共有用の文章をコピーしました。";
        } else {
          window.prompt("以下をコピーして共有してください。", `${text}\n${location.href}`);
          $("shareStatus").textContent = "共有用の文章を表示しました。";
        }
      } catch (error) {
        if (error && error.name !== "AbortError") {
          $("shareStatus").textContent = "共有できませんでした。もう一度お試しください。";
        }
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      setToday();

      const saved = loadFortune();
      if (saved) {
        showFortune(saved);
      }

      $("drawBtn").addEventListener("click", () => {
        showFortune(currentFortune());
      });

      $("shareBtn").addEventListener("click", shareFortune);
    });
  </script>
</body>
</html>
